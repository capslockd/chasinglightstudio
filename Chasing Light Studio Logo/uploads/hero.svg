  <line x1="690" y1="465" x2="910" y2="465" stroke="#b89b6e" stroke-width="1"></line>
  <text x="800" y="503" text-anchor="middle" font-family="&#39;Jost&#39;, &#39;Helvetica Neue&#39;, Arial, sans-serif" font-size="17" letter-spacing="7" fill="#8a7554">CHASING LIGHT, CAPTURING MOMENTS</text>
