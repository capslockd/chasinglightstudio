      <line x1="26.2" y1="-26.2" x2="34.6" y2="-34.6"></line>
      <line x1="37" y1="0" x2="49" y2="0"></line>
      <line x1="26.2" y1="26.2" x2="34.6" y2="34.6"></line>
      <line x1="0" y1="37" x2="0" y2="49"></line>
      <line x1="-26.2" y1="26.2" x2="-34.6" y2="34.6"></line>
      <line x1="-37" y1="0" x2="-49" y2="0"></line>
      <line x1="-26.2" y1="-26.2" x2="-34.6" y2="-34.6"></line>
    </g>
  </g>

  
  <path d="M0 620 Q 400 540 800 600 T 1600 580 V 760 H 0 Z" fill="url(#hillA)" opacity="0.7"></path>
  <path d="M0 680 Q 450 610 900 665 T 1600 650 V 760 H 0 Z" fill="url(#hillB)" opacity="0.75"></path>

  
  <g stroke="#8a7554" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55">
