<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" role="img" aria-label="Chasing Light Studio — every moment tells a story">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdfcfa"></stop>
      <stop offset="0.55" stop-color="#f6efe3"></stop>
      <stop offset="1" stop-color="#eee3cf"></stop>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#f0dcb4" stop-opacity="0.9"></stop>
      <stop offset="0.5" stop-color="#ecd9b6" stop-opacity="0.35"></stop>
      <stop offset="1" stop-color="#ecd9b6" stop-opacity="0"></stop>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c9ad7f"></stop>
      <stop offset="1" stop-color="#a68956"></stop>
    </linearGradient>
    <linearGradient id="hillA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3d3b7"></stop>
      <stop offset="1" stop-color="#d9c6a4"></stop>
