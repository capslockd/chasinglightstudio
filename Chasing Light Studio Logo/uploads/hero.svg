  </defs>

  <rect width="1600" height="760" fill="url(#sky)"></rect>
  <rect width="1600" height="760" fill="url(#sunGlow)"></rect>

  
  <g stroke="#c9ad7f" stroke-width="1.2" opacity="0.3" stroke-linecap="round">
