    <line x1="800" y1="300" x2="180" y2="510"></line>
    <line x1="800" y1="300" x2="1420" y2="90"></line>
    <line x1="800" y1="300" x2="1520" y2="300"></line>
    <line x1="800" y1="300" x2="1420" y2="510"></line>
    <line x1="800" y1="300" x2="500" y2="30"></line>
    <line x1="800" y1="300" x2="1100" y2="30"></line>
